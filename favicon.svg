<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Wheat spike favicon for Pinko SA -->
  <rect width="64" height="64" rx="8" fill="#4a2c2a"/>
  <!-- Stem -->
  <line x1="32" y1="58" x2="32" y2="16" stroke="#c8a45c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Grains - left side -->
  <ellipse cx="26" cy="20" rx="5" ry="3" fill="#c8a45c" transform="rotate(-30 26 20)"/>
  <ellipse cx="26" cy="28" rx="5" ry="3" fill="#c8a45c" transform="rotate(-30 26 28)"/>
  <ellipse cx="27" cy="36" rx="5" ry="3" fill="#c8a45c" transform="rotate(-25 27 36)"/>
  <ellipse cx="28" cy="44" rx="4.5" ry="2.8" fill="#c8a45c" transform="rotate(-20 28 44)"/>
  <!-- Grains - right side -->
  <ellipse cx="38" cy="20" rx="5" ry="3" fill="#c8a45c" transform="rotate(30 38 20)"/>
  <ellipse cx="38" cy="28" rx="5" ry="3" fill="#c8a45c" transform="rotate(30 38 28)"/>
  <ellipse cx="37" cy="36" rx="5" ry="3" fill="#c8a45c" transform="rotate(25 37 36)"/>
  <ellipse cx="36" cy="44" rx="4.5" ry="2.8" fill="#c8a45c" transform="rotate(20 36 44)"/>
  <!-- Top grain -->
  <ellipse cx="32" cy="14" rx="3" ry="5" fill="#c8a45c"/>
  <!-- Awns (whiskers) -->
  <line x1="32" y1="10" x2="28" y2="4" stroke="#c8a45c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="10" x2="36" y2="4" stroke="#c8a45c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="10" x2="32" y2="3" stroke="#c8a45c" stroke-width="1.5" stroke-linecap="round"/>
</svg>
